site_name: ZUtils
site_description: Python utilities and CLI for sleep and physiological data workflows

repo_url: https://github.com/alitsaberi/zutils
repo_name: alitsaberi/zutils
edit_uri: edit/master/docs/

copyright: Copyright &copy; Ali Saberi

plugins:
  - search
  - mkdocs-typer2:
      pretty: true
      engine: legacy

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.expand
    - navigation.path
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - CLI: user-guide/cli.md
    - Download NSRR: user-guide/download-nsrr.md
    - Data Types: user-guide/data.md
  - Reference:
    - CLI: reference/cli.md
    - Data: reference/data.md
    - I/O: reference/io.md
  - Contributing: contributing.md
  - Release Notes: release-notes.md
