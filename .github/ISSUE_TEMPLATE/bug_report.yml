name: Bug report
description: Report something that's broken or incorrect.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        If this is a security issue, please do not open a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and any relevant details.
      placeholder: |
        - OS:
        - Python:
        - slumber version:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant logs (redact secrets).
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: impact
    attributes:
      label: Impact / follow-ups
      options:
        - label: I can open a PR to fix this
          required: false
        - label: This needs documentation updates
          required: false
        - label: This needs tests or a regression test
          required: false
