name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify git tag matches pyproject version
        run: |
          set -euo pipefail
          VERSION="$(uv version --short)"
          TAG_NAME="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_NAME" ]; then
            echo "::error::Git tag ${GITHUB_REF_NAME} implies version ${TAG_NAME}, but pyproject.toml has ${VERSION}."
            exit 1
          fi

      - name: Install dependencies and run tests
        run: |
          uv sync --locked --all-extras --dev
          uv run pytest

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl python -c "import somnio"

      - name: Smoke test (sdist)
        run: uv run --isolated --no-project --with dist/*.tar.gz python -c "import somnio"

      - name: Publish to PyPI
        run: uv publish
